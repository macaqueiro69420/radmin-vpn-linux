name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64 libgtk-4-dev imagemagick file

      - name: Build binaries
        run: make

      - name: Build AppImage
        run: ./packaging/build-appimage.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: radmin-vpn-linux-binaries
          path: |
            build/rvpnnetmp.sys
            build/adapter_hook.dll
            build/rvpn_launcher.exe
            build/netsh.exe
            build/netsh64.exe
            build/tap_bridge
            build/rvpn_filter_ui

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: radmin-vpn-linux-appimage
          path: packaging/dist/RadminVPN-Linux-x86_64.AppImage

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: radmin-vpn-linux-binaries
          path: build/

      - uses: actions/download-artifact@v4
        with:
          name: radmin-vpn-linux-appimage
          path: .

      - name: Package tarball
        run: tar czf radmin-vpn-linux-${{ github.ref_name }}.tar.gz -C build .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            radmin-vpn-linux-${{ github.ref_name }}.tar.gz
            RadminVPN-Linux-x86_64.AppImage
          generate_release_notes: true
